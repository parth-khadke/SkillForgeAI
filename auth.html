<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - SkillForge AI</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

  <!-- Navigation -->
  <nav class="auth-nav">
    <div class="auth-nav-container">
      <a href="index.html" class="auth-logo">
        <span class="logo-icon">⚒️</span>
        <span class="logo-text">SkillForge AI</span>
      </a>
      <a href="index.html" class="back-home">
        ← Back to Home
      </a>
    </div>
  </nav>

  <!-- Auth Container -->
  <div class="auth-container">
    <div class="auth-card">
      
      <!-- Logo & Title -->
      <div class="auth-header">
        <div class="auth-logo-icon">⚒️</div>
        <h1 class="auth-title">SkillForge AI</h1>
        <p class="auth-subtitle">Start your validated learning journey</p>
      </div>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">
          Login
        </button>
        <button class="auth-tab" data-tab="signup">
          Sign Up
        </button>
      </div>

      <!-- Alert Messages -->
      <div id="authAlert" class="auth-alert hidden"></div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label for="loginEmail" class="form-label">Email</label>
          <input 
            type="email" 
            id="loginEmail" 
            class="form-input" 
            placeholder="you@example.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="loginPassword" class="form-label">Password</label>
          <div class="password-input-wrapper">
            <input 
              type="password" 
              id="loginPassword" 
              class="form-input" 
              placeholder="Enter your password"
              required
            >
            <button type="button" class="password-toggle" data-target="loginPassword">
              <svg class="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" class="form-checkbox">
            <span>Remember me</span>
          </label>
          <button type="button" id="forgotPasswordBtn" class="forgot-password">Forgot password?</button>
        </div>

        <button type="submit" class="btn-primary btn-full">
          Sign In
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="signupName" class="form-label">Full Name</label>
          <input 
            type="text" 
            id="signupName" 
            class="form-input" 
            placeholder="John Doe"
            required
          >
        </div>

        <div class="form-group">
          <label for="signupEmail" class="form-label">Email</label>
          <input 
            type="email" 
            id="signupEmail" 
            class="form-input" 
            placeholder="you@example.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="signupPassword" class="form-label">Password</label>
          <div class="password-input-wrapper">
            <input 
              type="password" 
              id="signupPassword" 
              class="form-input" 
              placeholder="Create a strong password"
              required
            >
            <button type="button" class="password-toggle" data-target="signupPassword">
              <svg class="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
            </button>
          </div>
          <div class="password-requirements">
            <small>Must be at least 8 characters with 1 number and 1 special character</small>
          </div>
        </div>

        <div class="form-group">
  <label for="signupPasswordConfirm" class="form-label">Confirm Password</label>
  <div class="password-input-wrapper">
    <input 
      type="password" 
      id="signupPasswordConfirm" 
      class="form-input" 
      placeholder="Confirm your password"
      required
    >
    <button type="button" class="password-toggle" data-target="signupPasswordConfirm">
      <svg class="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
      </svg>
    </button>
  </div>
  <!-- NEW: Password match indicator -->
  <div id="passwordMatchIndicator" class="password-match-indicator"></div>
</div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="agreeTerms" class="form-checkbox" required>
            <span>I agree to the Terms of Service and Privacy Policy</span>
          </label>
        </div>

        <button type="submit" class="btn-primary btn-full">
          Create Account
        </button>
      </form>

    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
